services:
  - type: static
    name: frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://api-getway-tv5u.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
